name: Bug report
description: Something broke — parser, indexer, search, MCP tool, CLI command, or a published package.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. koncepto is pre-alpha — schema and APIs may shift, but crashes, bad output, and broken tools are bugs.

        **Security issue?** Stop and use [Private Vulnerability Reporting](https://github.com/yourtechtribe-labs/koncept-mcp/security/advisories/new) instead. Do not paste exploits here.

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@yourtechtribe-labs/koncept-core"
        - "@yourtechtribe-labs/koncept-mcp-server"
        - "@yourtechtribe-labs/koncept-cli"
        - Multiple / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm ls @yourtechtribe-labs/koncept-core` (or the CLI/server). Include the exact `0.1.0-alpha.x`.
      placeholder: "0.1.0-alpha.3"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (note in description)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? What did you expect instead?
      placeholder: |
        I ran `koncepto verify` and it crashed with `ENOENT` on a concept file that exists.
        Expected: clean exit 0 (the registry validates with `pnpm dogfood`).
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        A minimal `.koncept/concepts/<file>.yaml` (or MCP tool call, or CLI invocation) that triggers it.
        If it depends on a private codebase, replace concept content with a sanitized minimal example.
      render: yaml
      placeholder: |
        # .koncept/concepts/example.yaml
        id: example
        kind: invariant
        summary: triggers the bug
        ...
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command and full output
      description: Exact command(s) you ran and the full stderr/stdout. Wrap with triple backticks.
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Workarounds you tried, related issues, hypothesis about the cause.
    validations:
      required: false

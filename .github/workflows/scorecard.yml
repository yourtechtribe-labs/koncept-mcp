name: scorecard

# OpenSSF Scorecard supply-chain risk analysis.
# Runs weekly + on push to main. Publishes results to:
#   - the public Scorecard API (allows the badge in README)
#   - GitHub code-scanning (Security tab → Code scanning alerts)
#
# Required repo settings:
#   - Settings → Actions → General → Workflow permissions → "Read repository
#     contents and packages permissions" (default).
#   - Settings → Code security → Code scanning enabled.
# The `id-token: write` permission below is what lets Scorecard publish to
# the public API without a PAT.

on:
  branch_protection_rule:
  schedule:
    - cron: '37 6 * * 1'   # Mondays 06:37 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to scorecard.dev
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif

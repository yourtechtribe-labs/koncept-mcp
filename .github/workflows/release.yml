name: release

# Publishes all 3 packages to npm with provenance attestations,
# using GitHub Actions OIDC trusted publishing (no NPM_TOKEN needed).
#
# Trigger: push of a tag matching v*.
# Prereq: configure trusted publisher on npmjs.com for each package
# (Settings → Publishing → Trusted publisher → GitHub Actions),
# pointing to repo `yourtechtribe-labs/koncept-mcp` and workflow file
# `release.yml`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no publish)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm ≥ 11.5.1 is required for OIDC trusted publishing
      # (https://docs.npmjs.com/trusted-publishers). Node 24 ships npm 11.x
      # but we belt-and-suspenders to the latest in case the runner image lags.
      - name: Ensure npm ≥ 11.5.1
        run: npm i -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Dogfood
        run: pnpm dogfood

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pnpm -r publish --dry-run --tag alpha --no-git-checks --access public

      - name: Publish to npm with provenance
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: pnpm -r publish --tag alpha --no-git-checks --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      # MCP registry sync. Runs only on real publishes (tag push or
      # explicit non-dry workflow_dispatch). Auths via OIDC — no token
      # needed. Re-syncs server.json to match the tag, then publishes.
      - name: Install mcp-publisher
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version with package.json
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        working-directory: packages/koncept-mcp-server
        run: |
          VERSION=$(node -p "require('./package.json').version")
          export V="$VERSION"
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('server.json','utf8'));j.version=process.env.V;j.packages[0].version=process.env.V;fs.writeFileSync('server.json',JSON.stringify(j,null,2)+'\n')"
          cat server.json

      - name: Publish to MCP registry (GitHub OIDC)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        working-directory: packages/koncept-mcp-server
        run: |
          ${GITHUB_WORKSPACE}/mcp-publisher login github-oidc
          ${GITHUB_WORKSPACE}/mcp-publisher publish

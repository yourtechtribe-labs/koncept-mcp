name: release

# Publishes all 3 packages to npm with provenance attestations,
# using GitHub Actions OIDC trusted publishing (no NPM_TOKEN needed).
#
# Trigger: push of a tag matching v*.
# Prereq: configure trusted publisher on npmjs.com for each package
# (Settings → Publishing → Trusted publisher → GitHub Actions),
# pointing to repo `yourtechtribe-labs/koncept-mcp` and workflow file
# `release.yml`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no publish)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm ≥ 11.5.1 is required for OIDC trusted publishing
      # (https://docs.npmjs.com/trusted-publishers). Node 24 ships npm 11.x
      # but we belt-and-suspenders to the latest in case the runner image lags.
      - name: Ensure npm ≥ 11.5.1
        run: npm i -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Dogfood
        run: pnpm dogfood

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pnpm -r publish --dry-run --tag alpha --no-git-checks --access public

      - name: Publish to npm with provenance
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: pnpm -r publish --tag alpha --no-git-checks --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: 'true'

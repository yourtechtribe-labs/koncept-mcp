version: 2

updates:
  # npm ecosystem — covers root + all workspace packages automatically
  # (Dependabot v2 supports pnpm workspaces since 2024).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      development-minor-patch:
        dependency-type: development
        update-types: [minor, patch]
    labels: [dependencies]
    commit-message:
      prefix: chore(deps)
      include: scope

  # GitHub Actions — keeps SHA pins current. Without this, the pinned SHAs
  # silently age and we miss upstream security patches.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    labels: [dependencies, ci]
    commit-message:
      prefix: ci(deps)
